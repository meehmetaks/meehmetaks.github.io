<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İletişim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header></header>

<div class="contact-page">
  <div class="contact-left">
    <p class="contact-label">İLETİŞİM</p>
    <h1>Benimle iletişime geçin.</h1>

    <p class="contact-text">
      Projeler, iş birliği fırsatları veya teknik konular hakkında iletişime geçmek isterseniz
      aşağıdaki bilgiler üzerinden bana ulaşabilirsiniz.
    </p>

    <div class="contact-info">
      <div class="contact-item">
        <span>E-posta</span>
        <a href="mailto:meehmetakis@gmail.com">meehmetakis@gmail.com</a>
      </div>

      <div class="contact-item">
        <span>GitHub</span>
        <a href="https://github.com/meehmetaks" target="_blank">github.com/meehmetaks</a>
      </div>

      <div class="contact-item">
        <span>LinkedIn</span>
        <a href="https://linkedin.com/meehmetakis" target="_blank">linkedin.com/in/meehmetakis</a>
      </div>
    </div>
  </div>

  <div class="contact-right">
    <form class="contact-form">
      <label>Ad Soyad</label>
      <input type="text" placeholder="Adınızı girin">

      <label>E-posta</label>
      <input type="email" placeholder="E-posta adresinizi girin">

      <label>Konu</label>
      <input type="text" placeholder="Mesaj konusu">

      <label>Mesaj</label>
      <textarea placeholder="Mesajınızı yazın"></textarea>

      <button type="submit">Mesaj Gönder</button>
    </form>
  </div>
</div>

<script src="menu.js"></script>
</body>
</html>
